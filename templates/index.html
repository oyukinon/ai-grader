<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 改卷系统</title>
    <style>
        :root{--bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--text-secondary:#86868b;--accent:#0071e3;--accent-hover:#0077ed;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--border:rgba(0,0,0,.08);--shadow:0 2px 12px rgba(0,0,0,.08);--radius:16px;--radius-sm:10px;--radius-xs:8px;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC',sans-serif;--font-mono:'SF Mono','Menlo','Monaco','Consolas',monospace;--transition:all .25s cubic-bezier(.4,0,.2,1)}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        .container{max-width:880px;margin:0 auto;padding:2rem 1.5rem 4rem}
        header{margin-bottom:2rem;padding-bottom:1.5rem}
        header h1{font-size:2.2rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:.35rem}
        header h1 span{color:var(--accent)}
        header p{color:var(--text-secondary);font-size:.92rem}
        .nav{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--surface);border-radius:var(--radius-sm);padding:4px;box-shadow:var(--shadow);width:fit-content}
        .nav a{padding:.5rem 1.1rem;border-radius:var(--radius-xs);font-size:.82rem;font-weight:600;text-decoration:none;color:var(--text-secondary);transition:var(--transition)}
        .nav a:hover{color:var(--text);background:rgba(0,0,0,.04)}
        .nav a.active{color:#fff;background:var(--accent);box-shadow:0 1px 4px rgba(0,113,227,.3)}
        .section{margin-bottom:1.5rem}
        .section-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);margin-bottom:.5rem;font-weight:600}
        .card{background:var(--surface);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow)}
        label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.35rem;color:var(--text)}
        textarea{width:100%;min-height:180px;padding:.75rem 1rem;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.88rem;line-height:1.7;background:rgba(0,0,0,.03);color:var(--text);resize:vertical;outline:none;transition:var(--transition)}
        textarea:focus{background:var(--surface);box-shadow:0 0 0 3px rgba(0,113,227,.18)}
        input[type="text"],input[type="password"]{width:100%;padding:.6rem .85rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:.82rem;background:rgba(0,0,0,.03);color:var(--text);outline:none;transition:var(--transition)}
        input:focus{background:var(--surface);box-shadow:0 0 0 3px rgba(0,113,227,.18)}
        input::placeholder,textarea::placeholder{color:var(--text-secondary)}
        .form-row{margin-bottom:.75rem}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
        .toggle-btn{background:none;border:none;padding:.5rem 0;font-family:var(--font);font-size:.82rem;color:var(--accent);cursor:pointer;font-weight:500;transition:var(--transition)}
        .toggle-btn:hover{opacity:.7}
        .upload-zone{border:2px dashed rgba(0,0,0,.12);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:var(--transition);background:rgba(0,0,0,.015);position:relative}
        .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(0,113,227,.04)}
        .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
        .upload-icon{font-size:2rem;margin-bottom:.6rem;color:var(--text-secondary)}
        .upload-text{font-size:.9rem;color:var(--text-secondary)}
        .upload-text strong{color:var(--accent);font-weight:600}
        .upload-hint{font-size:.72rem;color:var(--text-secondary);margin-top:.4rem}
        .file-list{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.5rem;padding:0 1rem .5rem}
        .file-item{display:inline-flex;align-items:center;gap:.4rem;border-radius:var(--radius-xs);overflow:hidden;background:rgba(0,0,0,.03);padding:3px}
        .file-thumb{width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0}
        .file-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(0,113,227,.08);color:var(--accent);font-size:.58rem;font-weight:700;border-radius:6px;flex-shrink:0}
        .file-info{padding:.15rem .4rem .15rem 0;display:flex;align-items:center;gap:.3rem}
        .file-info span{font-size:.75rem;font-family:var(--font-mono);color:var(--text);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .file-remove{cursor:pointer;font-weight:700;opacity:.35;transition:var(--transition);font-size:.85rem;padding:0 .2rem}
        .file-remove:hover{opacity:1;color:var(--red)}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.3rem;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--transition);letter-spacing:-.01em}
        .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,113,227,.25)}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-secondary{background:rgba(0,0,0,.05);color:var(--text)}.btn-secondary:hover{background:rgba(0,0,0,.08)}
        .btn-group{display:flex;gap:.5rem;align-items:center;margin-top:1rem}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .progress-bar{width:100%;height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden;margin-top:.75rem;opacity:0;transition:opacity .3s}
        .progress-bar.active{opacity:1}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#40a9ff);border-radius:2px;width:0%;transition:width .5s ease}
        .result-card{background:var(--surface);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden;box-shadow:var(--shadow);opacity:0;animation:fadeUp .3s ease forwards}
        .result-card:nth-child(2){animation-delay:.05s}
        .result-card:nth-child(3){animation-delay:.1s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .result-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1.2rem;cursor:pointer;transition:var(--transition)}
        .result-header:hover{background:rgba(0,0,0,.02)}
        .result-name{font-size:.92rem;font-weight:600}
        .result-badges{display:flex;gap:.35rem;align-items:center}
        .badge{padding:.15rem .55rem;border-radius:6px;font-size:.7rem;font-weight:600}
        .badge-score{background:rgba(0,113,227,.1);color:var(--accent)}.badge-grade{background:var(--text);color:#fff}.badge-error{background:rgba(255,59,48,.1);color:var(--red)}.badge-img{background:rgba(52,199,89,.1);color:var(--green)}
        .result-body{padding:0 1.2rem 1.2rem;display:none}
        .result-body.open{display:block}
        .result-section{margin-bottom:.8rem}
        .result-section h4{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);margin-bottom:.3rem;font-weight:600}
        .result-section p{font-size:.85rem;line-height:1.7}
        .result-section ul{list-style:none;padding:0}
        .result-section li{font-size:.82rem;padding:.25rem 0;padding-left:1rem;position:relative;line-height:1.5}
        .result-section li::before{content:'';position:absolute;left:0;top:.6rem;width:5px;height:5px;border-radius:50%}
        .correct li::before{background:var(--green)}.wrong li::before{background:var(--red)}.suggestions li::before{background:var(--accent)}
        .expand-arrow{transition:transform .3s;font-size:.7rem;color:var(--text-secondary)}
        .result-header.expanded .expand-arrow{transform:rotate(180deg)}
        .error-card{background:rgba(255,59,48,.03)}
        .error-msg{padding:.8rem 1.2rem;color:var(--red);font-size:.82rem}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
        .stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:1rem;text-align:center;box-shadow:var(--shadow)}
        .stat-value{font-size:1.6rem;font-weight:700;line-height:1;margin-bottom:.2rem;letter-spacing:-.02em}
        .stat-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);font-weight:500}
        #status{margin-top:.75rem;font-size:.82rem;color:var(--text-secondary);min-height:1.2em}
        .recognized-text{background:rgba(0,0,0,.02);border-radius:var(--radius-xs);padding:.65rem;font-size:.78rem;color:var(--text-secondary);font-family:var(--font-mono);max-height:110px;overflow-y:auto;line-height:1.5}
        @media(max-width:640px){.container{padding:1.25rem 1rem 3rem}header h1{font-size:1.6rem}.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.btn-group{flex-direction:column;align-items:stretch}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI<span>改卷</span>系统</h1>
            <p>上传学生答案，AI 自动评分并生成详细批改意见</p>
        </header>
        <div class="nav">
            <a href="/" class="active">手动改卷</a>
            <a href="/auto">自动阅卷</a>
        </div>

        <div class="section">
            <div class="section-label">API 配置</div>
            <div class="card">
                <button class="toggle-btn" onclick="toggleApiConfig()"><span id="toggleText">展开配置</span> &#9662;</button>
                <div id="apiConfigFields" style="display:none;margin-top:.75rem;">
                    <div class="form-grid">
                        <div class="form-row"><label>API Key</label><input type="password" id="apiKey" placeholder="输入密钥" autocomplete="off"></div>
                        <div class="form-row"><label>API 地址</label><input type="text" id="apiBase" value="https://ark.cn-beijing.volces.com/api/v3"></div>
                        <div class="form-row"><label>文本模型</label><input type="text" id="model" value="doubao-1.5-pro-32k"></div>
                        <div class="form-row"><label>视觉模型</label><input type="text" id="visionModel" value="doubao-1.5-vision-pro-32k"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-label">参考答案与评分标准</div>
            <div class="card">
                <textarea id="reference" placeholder="在此输入标准答案和评分标准..."></textarea>
            </div>
        </div>

        <div class="section">
            <div class="section-label">上传学生答案</div>
            <div class="card" style="padding:0;overflow:hidden;">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" multiple accept=".txt,.md,.jpg,.jpeg,.png,.webp,.bmp">
                    <div class="upload-icon">&#8593;</div>
                    <div class="upload-text">拖拽文件到这里，或 <strong>点击选择</strong></div>
                    <div class="upload-hint">支持 .txt / .md（文本）和 .jpg / .png（图片） &middot; 文件名即为学生姓名</div>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>
        </div>

        <div class="section">
            <div class="btn-group">
                <button class="btn btn-primary" id="gradeBtn" onclick="startGrading()">开始批改</button>
                <button class="btn btn-secondary" id="exportBtn" onclick="exportCSV()" style="display:none;">导出 CSV</button>
            </div>
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="status"></div>
        </div>

        <div id="resultsContainer" style="display:none;">
            <div class="section">
                <div class="section-label">批改结果</div>
                <div class="stats" id="stats"></div>
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let lastResults = [];

        function saveManualForm(){
            try{
                localStorage.setItem('ag_manual_apiKey',document.getElementById('apiKey').value);
                localStorage.setItem('ag_manual_apiBase',document.getElementById('apiBase').value);
                localStorage.setItem('ag_manual_model',document.getElementById('model').value);
                localStorage.setItem('ag_manual_visionModel',document.getElementById('visionModel').value);
                localStorage.setItem('ag_manual_reference',document.getElementById('reference').value);
            }catch(e){}
        }
        function loadManualForm(){
            try{
                var v;
                v=localStorage.getItem('ag_manual_apiKey');if(v!==null)document.getElementById('apiKey').value=v;
                v=localStorage.getItem('ag_manual_apiBase');if(v!==null)document.getElementById('apiBase').value=v;
                v=localStorage.getItem('ag_manual_model');if(v!==null)document.getElementById('model').value=v;
                v=localStorage.getItem('ag_manual_visionModel');if(v!==null)document.getElementById('visionModel').value=v;
                v=localStorage.getItem('ag_manual_reference');if(v!==null)document.getElementById('reference').value=v;
            }catch(e){}
        }

        function toggleApiConfig(){
            var fields=document.getElementById('apiConfigFields');
            var text=document.getElementById('toggleText');
            if(fields.style.display==='none'){fields.style.display='block';text.textContent='收起配置'}
            else{fields.style.display='none';text.textContent='展开配置'}
        }

        var uploadZone=document.getElementById('uploadZone');
        var fileInput=document.getElementById('fileInput');
        uploadZone.addEventListener('dragover',function(e){e.preventDefault();uploadZone.classList.add('drag-over')});
        uploadZone.addEventListener('dragleave',function(){uploadZone.classList.remove('drag-over')});
        uploadZone.addEventListener('drop',function(e){e.preventDefault();uploadZone.classList.remove('drag-over');addFiles(e.dataTransfer.files)});
        fileInput.addEventListener('change',function(){addFiles(fileInput.files);fileInput.value=''});

        function addFiles(fileListObj){
            for(var i=0;i<fileListObj.length;i++){var f=fileListObj[i];if(!selectedFiles.some(function(s){return s.name===f.name})){selectedFiles.push(f)}}
            renderFileList();
        }
        function removeFile(name){selectedFiles=selectedFiles.filter(function(f){return f.name!==name});renderFileList()}
        function isImageFile(filename){return /\.(jpg|jpeg|png|webp|bmp)$/i.test(filename)}

        function renderFileList(){
            var container=document.getElementById('fileList');
            container.innerHTML='';
            selectedFiles.forEach(function(f){
                var ext=f.name.split('.').pop().toUpperCase();
                var item=document.createElement('div');item.className='file-item';
                if(isImageFile(f.name)){
                    var thumb=document.createElement('img');thumb.className='file-thumb';thumb.src=URL.createObjectURL(f);item.appendChild(thumb);
                }else{
                    var icon=document.createElement('div');icon.className='file-icon';icon.textContent=ext;item.appendChild(icon);
                }
                var info=document.createElement('div');info.className='file-info';
                info.innerHTML='<span>'+f.name+'</span><span class="file-remove" onclick="removeFile(\''+f.name+'\')">&#215;</span>';
                item.appendChild(info);container.appendChild(item);
            });
        }

        async function startGrading(){
            var reference=document.getElementById('reference').value.trim();
            var apiKey=document.getElementById('apiKey').value.trim();
            var apiBase=document.getElementById('apiBase').value.trim();
            var model=document.getElementById('model').value.trim();
            var visionModel=document.getElementById('visionModel').value.trim();
            saveManualForm();
            if(!apiKey){alert('请填写 API Key');toggleApiConfig();return}
            if(!reference){alert('请填写参考答案');return}
            if(selectedFiles.length===0){alert('请上传学生答案文件');return}
            var btn=document.getElementById('gradeBtn');
            var progressFill=document.getElementById('progressFill');
            var status=document.getElementById('status');
            btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 批改中...';
            document.getElementById('progressBar').classList.add('active');
            progressFill.style.width='0%';
            var formData=new FormData();
            formData.append('api_key',apiKey);
            formData.append('api_base',apiBase||'https://ark.cn-beijing.volces.com/api/v3');
            formData.append('model',model||'doubao-1.5-pro-32k');
            formData.append('vision_model',visionModel||'doubao-1.5-vision-pro-32k');
            formData.append('reference',reference);
            for(var i=0;i<selectedFiles.length;i++){formData.append('files',selectedFiles[i])}
            var total=selectedFiles.length;
            progressFill.style.width='20%';status.textContent='正在上传 '+total+' 个文件...';
            try{
                var resp=await fetch('/api/grade',{method:'POST',body:formData});
                progressFill.style.width='80%';
                var data=await resp.json();
                if(data.error){alert(data.error);resetUI();return}
                progressFill.style.width='100%';status.textContent='批改完成！共处理 '+data.results.length+' 份答案。';
                lastResults=data.results;renderResults(data.results);
                document.getElementById('exportBtn').style.display='inline-flex';
            }catch(err){alert('请求失败: '+err.message)}
            resetUI();
        }

        function resetUI(){
            var btn=document.getElementById('gradeBtn');btn.disabled=false;btn.innerHTML='开始批改';
            setTimeout(function(){document.getElementById('progressBar').classList.remove('active')},1000);
        }

        function renderResults(results){
            var container=document.getElementById('resultsContainer');
            var resultsDiv=document.getElementById('results');
            var statsDiv=document.getElementById('stats');
            container.style.display='block';resultsDiv.innerHTML='';
            var successful=results.filter(function(r){return r.success});
            var avgScore=successful.length>0?Math.round(successful.reduce(function(s,r){return s+(r.data.score||0)},0)/successful.length):0;
            var maxScore=successful.length>0?Math.max.apply(null,successful.map(function(r){return r.data.score||0})):0;
            var minScore=successful.length>0?Math.min.apply(null,successful.map(function(r){return r.data.score||0})):0;
            statsDiv.innerHTML='<div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+avgScore+'</div><div class="stat-label">平均分</div></div><div class="stat-card"><div class="stat-value" style="color:var(--green)">'+maxScore+'</div><div class="stat-label">最高分</div></div><div class="stat-card"><div class="stat-value" style="color:var(--red)">'+minScore+'</div><div class="stat-label">最低分</div></div>';
            for(var i=0;i<results.length;i++){
                var r=results[i];var id='result-'+i;
                if(!r.success){
                    resultsDiv.innerHTML+='<div class="result-card error-card"><div class="result-header"><span class="result-name">'+r.student+'</span><span class="badge badge-error">失败</span></div><div class="error-msg">'+r.error+'</div></div>';continue;
                }
                var d=r.data;
                var imgBadge=r.is_image?'<span class="badge badge-img">图片</span>':'';
                var recognizedSection=d.recognized_text?'<div class="result-section"><h4>图片识别</h4><div class="recognized-text">'+d.recognized_text+'</div></div>':'';
                resultsDiv.innerHTML+='<div class="result-card"><div class="result-header" onclick="toggleResult(\''+id+'\')"><span class="result-name">'+r.student+'</span><div class="result-badges">'+imgBadge+'<span class="badge badge-score">'+d.score+'/'+(d.max_score||100)+'</span><span class="badge badge-grade">'+d.grade+'</span><span class="expand-arrow">&#9662;</span></div></div><div class="result-body" id="'+id+'">'+recognizedSection+'<div class="result-section"><h4>总体评价</h4><p>'+d.summary+'</p></div><div class="result-section correct"><h4>正确要点</h4><ul>'+(d.correct_points||[]).map(function(p){return '<li>'+p+'</li>'}).join('')+'</ul></div><div class="result-section wrong"><h4>错误/缺失</h4><ul>'+(d.wrong_points||[]).map(function(p){return '<li>'+p+'</li>'}).join('')+'</ul></div><div class="result-section suggestions"><h4>改进建议</h4><ul>'+(d.suggestions||[]).map(function(p){return '<li>'+p+'</li>'}).join('')+'</ul></div><div class="result-section"><h4>详细评语</h4><p>'+d.detailed_comment+'</p></div></div></div>';
            }
            container.scrollIntoView({behavior:'smooth',block:'start'});
        }

        function toggleResult(id){var el=document.getElementById(id);el.classList.toggle('open');el.previousElementSibling.classList.toggle('expanded')}

        async function exportCSV(){
            if(lastResults.length===0)return;
            try{
                var resp=await fetch('/api/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({results:lastResults})});
                var blob=await resp.blob();var url=URL.createObjectURL(blob);
                var a=document.createElement('a');a.href=url;a.download='grade_results.csv';
                document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
            }catch(err){alert('导出失败: '+err.message)}
        }

        document.addEventListener('DOMContentLoaded',function(){loadManualForm()});
    </script>
</body>
</html>
