<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能改卷系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8;
            --surface: #ffffff;
            --surface-alt: #faf7f2;
            --accent: #b44a2d;
            --accent-light: #d4654a;
            --accent-bg: #fdf0ec;
            --text: #2c2418;
            --text-muted: #8a7e6e;
            --border: #e0d8ca;
            --border-strong: #c4b8a4;
            --green: #3a7d44;
            --green-bg: #edf7ef;
            --red: #b44a2d;
            --red-bg: #fdf0ec;
            --shadow: 0 2px 20px rgba(44, 36, 24, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --font-display: 'Noto Serif SC', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-display);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }
        .container { max-width: 880px; margin: 0 auto; padding: 3rem 2rem 6rem; }
        header { text-align: left; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 2px solid var(--text); }
        header h1 { font-size: 2.6rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; }
        header h1 span { color: var(--accent); }
        header p { color: var(--text-muted); font-size: 1rem; max-width: 500px; }
        .section { margin-bottom: 2.5rem; }
        .section-label { font-size: 0.75rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.75rem; font-weight: 500; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); }
        .api-config { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .api-config .full-width { grid-column: 1 / -1; }
        .toggle-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 1rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
        .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            background: var(--surface-alt);
            color: var(--text);
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-display);
            font-size: 0.9rem;
            line-height: 1.7;
            background: var(--surface-alt);
            color: var(--text);
            resize: vertical;
            transition: border-color 0.2s;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        .upload-zone {
            border: 2px dashed var(--border-strong);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--surface-alt);
            position: relative;
        }
        .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.6; }
        .upload-text { font-size: 0.95rem; color: var(--text-muted); }
        .upload-text strong { color: var(--accent); }
        .upload-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; font-family: var(--font-mono); }
        .file-list { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 1rem 0.5rem; }

        .file-item {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .file-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .file-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-bg);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .file-info {
            padding: 0.2rem 0.5rem 0.2rem 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .file-info span {
            font-size: 0.78rem;
            font-family: var(--font-mono);
            color: var(--text);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-remove {
            cursor: pointer;
            font-weight: 700;
            opacity: 0.4;
            transition: opacity 0.2s;
            font-size: 0.9rem;
            padding: 0 0.3rem;
        }
        .file-remove:hover { opacity: 1; color: var(--red); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-primary { background: var(--text); color: var(--bg); }
        .btn-primary:hover { background: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(180, 74, 45, 0.25); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: transparent; color: var(--text); border: 1.5px solid var(--border-strong); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-group { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.5rem; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 1rem; opacity: 0; transition: opacity 0.3s; }
        .progress-bar.active { opacity: 1; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.5s ease; }
        .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.25rem; overflow: hidden; box-shadow: var(--shadow); opacity: 0; animation: fadeUp 0.4s ease forwards; }
        .result-card:nth-child(2) { animation-delay: 0.05s; }
        .result-card:nth-child(3) { animation-delay: 0.1s; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .result-header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 1.5rem; cursor: pointer; transition: background 0.2s; }
        .result-header:hover { background: var(--surface-alt); }
        .result-name { font-size: 1.05rem; font-weight: 600; }
        .result-badges { display: flex; gap: 0.5rem; align-items: center; }
        .badge { padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.8rem; font-family: var(--font-mono); font-weight: 500; }
        .badge-score { background: var(--accent-bg); color: var(--accent); }
        .badge-grade { background: var(--text); color: var(--bg); }
        .badge-error { background: var(--red-bg); color: var(--red); }
        .badge-img { background: var(--green-bg); color: var(--green); }
        .result-body { padding: 0 1.5rem 1.5rem; display: none; }
        .result-body.open { display: block; }
        .result-section { margin-bottom: 1rem; }
        .result-section h4 { font-size: 0.8rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.4rem; }
        .result-section p { font-size: 0.9rem; line-height: 1.8; }
        .result-section ul { list-style: none; padding: 0; }
        .result-section li { font-size: 0.88rem; padding: 0.3rem 0; padding-left: 1.2rem; position: relative; line-height: 1.6; }
        .result-section li::before { content: ''; position: absolute; left: 0; top: 0.7rem; width: 6px; height: 6px; border-radius: 50%; }
        .correct li::before { background: var(--green); }
        .wrong li::before { background: var(--red); }
        .suggestions li::before { background: var(--accent); }
        .expand-arrow { transition: transform 0.3s; font-size: 0.8rem; color: var(--text-muted); }
        .result-header.expanded .expand-arrow { transform: rotate(180deg); }
        .error-card { border-color: var(--red); border-left: 4px solid var(--red); }
        .error-msg { padding: 1rem 1.5rem; color: var(--red); font-size: 0.9rem; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1.2rem; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; line-height: 1; margin-bottom: 0.3rem; }
        .stat-label { font-size: 0.75rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
        #status { margin-top: 1rem; font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted); min-height: 1.5em; }
        .recognized-text { background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.8rem; font-size: 0.82rem; color: var(--text-muted); font-family: var(--font-mono); max-height: 120px; overflow-y: auto; line-height: 1.6; }
        @media (max-width: 640px) {
            .container { padding: 2rem 1rem 4rem; }
            header h1 { font-size: 1.8rem; }
            .api-config { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI<span>改卷</span>系统</h1>
            <p>上传学生答案（文本或图片），AI 自动评分并生成详细批改意见</p>
        </header>
        <div class="nav" style="display:flex;gap:0.75rem;margin-bottom:2rem;">
            <a href="/" style="padding:0.45rem 1rem;border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none;border:1.5px solid #b44a2d;color:#b44a2d;background:#fdf0ec;">手动改卷</a>
            <a href="/auto" style="padding:0.45rem 1rem;border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none;border:1.5px solid #c4b8a4;color:#2c2418;">自动阅卷（智学网）</a>
        </div>


        <div class="section">
            <div class="section-label">01 / API 配置</div>
            <div class="card">
                <div class="api-config">
                    <div class="full-width">
                        <button class="toggle-btn" onclick="toggleApiConfig()"><span id="toggleText">展开配置</span> ▾</button>
                    </div>
                    <div id="apiConfigFields" style="display:none;" class="full-width">
                        <div style="margin-top:1rem;"><label for="apiKey">API Key</label><input type="password" id="apiKey" placeholder="sk-..." autocomplete="off"></div>
                        <div style="margin-top:1rem;"><label for="apiBase">API 地址</label><input type="text" id="apiBase" value="https://ark.cn-beijing.volces.com/api/v3"></div>
                        <div style="margin-top:1rem;"><label for="model">文本模型</label><input type="text" id="model" value="doubao-1.5-pro-32k"></div>
                        <div style="margin-top:1rem;"><label for="visionModel">视觉模型（图片识别用）</label><input type="text" id="visionModel" value="doubao-1.5-vision-pro-32k"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-label">02 / 参考答案与评分标准</div>
            <div class="card">
                <textarea id="reference" placeholder="在此输入标准答案和评分标准，例如：&#10;&#10;题目：请解释 HTTP 和 HTTPS 的区别（100分）&#10;&#10;评分标准：&#10;1. 正确说明 HTTPS = HTTP + SSL/TLS（20分）&#10;2. 提到数据加密传输（20分）&#10;3. 提到证书机制（15分）&#10;4. 提到端口区别 443 vs 80（15分）&#10;5. 提到安全性差异（15分）&#10;6. 表述清晰有条理（15分）"></textarea>
            </div>
        </div>

        <div class="section">
            <div class="section-label">03 / 上传学生答案</div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" multiple accept=".txt,.md,.jpg,.jpeg,.png,.webp,.bmp">
                    <div class="upload-icon">↑</div>
                    <div class="upload-text">拖拽文件到这里，或 <strong>点击选择</strong></div>
                    <div class="upload-hint">支持 .txt / .md（文本）和 .jpg / .png（图片） · 文件名即为学生姓名</div>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>
        </div>

        <div class="section">
            <div class="btn-group">
                <button class="btn btn-primary" id="gradeBtn" onclick="startGrading()">开始批改</button>
                <button class="btn btn-secondary" id="exportBtn" onclick="exportCSV()" style="display:none;">导出 CSV</button>
            </div>
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="status"></div>
        </div>

        <div id="resultsContainer" style="display: none;">
            <div class="section">
                <div class="section-label">04 / 批改结果</div>
                <div class="stats" id="stats"></div>
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let lastResults = [];

        // ============ localStorage 持久化 ============
        function saveManualForm(){
            try{
                localStorage.setItem('ag_manual_apiKey',document.getElementById('apiKey').value);
                localStorage.setItem('ag_manual_apiBase',document.getElementById('apiBase').value);
                localStorage.setItem('ag_manual_model',document.getElementById('model').value);
                localStorage.setItem('ag_manual_visionModel',document.getElementById('visionModel').value);
                localStorage.setItem('ag_manual_reference',document.getElementById('reference').value);
            }catch(e){}
        }
        function loadManualForm(){
            try{
                var v;
                v=localStorage.getItem('ag_manual_apiKey');if(v!==null)document.getElementById('apiKey').value=v;
                v=localStorage.getItem('ag_manual_apiBase');if(v!==null)document.getElementById('apiBase').value=v;
                v=localStorage.getItem('ag_manual_model');if(v!==null)document.getElementById('model').value=v;
                v=localStorage.getItem('ag_manual_visionModel');if(v!==null)document.getElementById('visionModel').value=v;
                v=localStorage.getItem('ag_manual_reference');if(v!==null)document.getElementById('reference').value=v;
            }catch(e){}
        }

        function toggleApiConfig() {
            const fields = document.getElementById('apiConfigFields');
            const text = document.getElementById('toggleText');
            if (fields.style.display === 'none') { fields.style.display = 'block'; text.textContent = '收起配置'; }
            else { fields.style.display = 'none'; text.textContent = '展开配置'; }
        }

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
        uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('drag-over'); });
        uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

        function addFiles(fileListObj) {
            for (const f of fileListObj) { if (!selectedFiles.some(s => s.name === f.name)) { selectedFiles.push(f); } }
            renderFileList();
        }
        function removeFile(name) { selectedFiles = selectedFiles.filter(f => f.name !== name); renderFileList(); }

        function isImageFile(filename) {
            return /\.(jpg|jpeg|png|webp|bmp)$/i.test(filename);
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            container.innerHTML = '';
            selectedFiles.forEach(f => {
                const ext = f.name.split('.').pop().toUpperCase();
                const item = document.createElement('div');
                item.className = 'file-item';

                if (isImageFile(f.name)) {
                    const thumb = document.createElement('img');
                    thumb.className = 'file-thumb';
                    thumb.src = URL.createObjectURL(f);
                    item.appendChild(thumb);
                } else {
                    const icon = document.createElement('div');
                    icon.className = 'file-icon';
                    icon.textContent = ext;
                    item.appendChild(icon);
                }

                const info = document.createElement('div');
                info.className = 'file-info';
                info.innerHTML = '<span>' + f.name + '</span><span class="file-remove" onclick="removeFile(\'' + f.name + '\')">×</span>';
                item.appendChild(info);
                container.appendChild(item);
            });
        }

        async function startGrading() {
            const reference = document.getElementById('reference').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const apiBase = document.getElementById('apiBase').value.trim();
            const model = document.getElementById('model').value.trim();
            const visionModel = document.getElementById('visionModel').value.trim();

            saveManualForm();

            if (!apiKey) { alert('请填写 API Key'); toggleApiConfig(); return; }
            if (!reference) { alert('请填写参考答案'); return; }
            if (selectedFiles.length === 0) { alert('请上传学生答案文件'); return; }

            const btn = document.getElementById('gradeBtn');
            const progressFill = document.getElementById('progressFill');
            const status = document.getElementById('status');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 批改中...';
            document.getElementById('progressBar').classList.add('active');
            progressFill.style.width = '0%';

            const formData = new FormData();
            formData.append('api_key', apiKey);
            formData.append('api_base', apiBase || 'https://ark.cn-beijing.volces.com/api/v3');
            formData.append('model', model || 'doubao-1.5-pro-32k');
            formData.append('vision_model', visionModel || 'doubao-1.5-vision-pro-32k');
            formData.append('reference', reference);
            for (const f of selectedFiles) { formData.append('files', f); }

            const total = selectedFiles.length;
            progressFill.style.width = '20%';
            status.textContent = '正在上传 ' + total + ' 个文件...';

            try {
                const resp = await fetch('/api/grade', { method: 'POST', body: formData });
                progressFill.style.width = '80%';
                const data = await resp.json();
                if (data.error) { alert(data.error); resetUI(); return; }
                progressFill.style.width = '100%';
                status.textContent = '批改完成！共处理 ' + data.results.length + ' 份答案。';
                lastResults = data.results;
                renderResults(data.results);
                document.getElementById('exportBtn').style.display = 'inline-flex';
            } catch (err) { alert('请求失败: ' + err.message); }
            resetUI();
        }

        function resetUI() {
            const btn = document.getElementById('gradeBtn');
            btn.disabled = false;
            btn.innerHTML = '开始批改';
            setTimeout(() => { document.getElementById('progressBar').classList.remove('active'); }, 1000);
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            const resultsDiv = document.getElementById('results');
            const statsDiv = document.getElementById('stats');
            container.style.display = 'block';
            resultsDiv.innerHTML = '';

            const successful = results.filter(r => r.success);
            const avgScore = successful.length > 0 ? Math.round(successful.reduce((s, r) => s + (r.data.score || 0), 0) / successful.length) : 0;
            const maxScore = successful.length > 0 ? Math.max(...successful.map(r => r.data.score || 0)) : 0;
            const minScore = successful.length > 0 ? Math.min(...successful.map(r => r.data.score || 0)) : 0;

            statsDiv.innerHTML = '<div class="stat-card"><div class="stat-value" style="color: var(--accent);">' + avgScore + '</div><div class="stat-label">平均分</div></div><div class="stat-card"><div class="stat-value" style="color: var(--green);">' + maxScore + '</div><div class="stat-label">最高分</div></div><div class="stat-card"><div class="stat-value" style="color: var(--red);">' + minScore + '</div><div class="stat-label">最低分</div></div>';

            for (let i = 0; i < results.length; i++) {
                const r = results[i];
                const id = 'result-' + i;
                if (!r.success) {
                    resultsDiv.innerHTML += '<div class="result-card error-card"><div class="result-header"><span class="result-name">' + r.student + '</span><span class="badge badge-error">批改失败</span></div><div class="error-msg">' + r.error + '</div></div>';
                    continue;
                }
                const d = r.data;
                const imgBadge = r.is_image ? '<span class="badge badge-img">图片</span>' : '';
                const recognizedSection = d.recognized_text ? '<div class="result-section"><h4>图片识别内容</h4><div class="recognized-text">' + d.recognized_text + '</div></div>' : '';

                resultsDiv.innerHTML += '<div class="result-card"><div class="result-header" onclick="toggleResult(\'' + id + '\')"><span class="result-name">' + r.student + '</span><div class="result-badges">' + imgBadge + '<span class="badge badge-score">' + d.score + '/' + (d.max_score || 100) + '</span><span class="badge badge-grade">' + d.grade + '</span><span class="expand-arrow">▾</span></div></div><div class="result-body" id="' + id + '">' + recognizedSection + '<div class="result-section"><h4>总体评价</h4><p>' + d.summary + '</p></div><div class="result-section correct"><h4>正确要点</h4><ul>' + (d.correct_points || []).map(p => '<li>' + p + '</li>').join('') + '</ul></div><div class="result-section wrong"><h4>错误/缺失要点</h4><ul>' + (d.wrong_points || []).map(p => '<li>' + p + '</li>').join('') + '</ul></div><div class="result-section suggestions"><h4>改进建议</h4><ul>' + (d.suggestions || []).map(p => '<li>' + p + '</li>').join('') + '</ul></div><div class="result-section"><h4>详细评语</h4><p>' + d.detailed_comment + '</p></div></div></div>';
            }
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function toggleResult(id) { const el = document.getElementById(id); el.classList.toggle('open'); el.previousElementSibling.classList.toggle('expanded'); }

        async function exportCSV() {
            if (lastResults.length === 0) return;
            try {
                const resp = await fetch('/api/export', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ results: lastResults }) });
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'grade_results.csv';
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            } catch (err) { alert('导出失败: ' + err.message); }
        }

        // 页面加载时恢复表单
        document.addEventListener('DOMContentLoaded', function(){
            loadManualForm();
        });
    </script>
</body>
</html>
