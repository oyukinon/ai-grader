<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI改卷系统o_o</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f5f0e8;--surface:#fff;--surface-alt:#faf7f2;--accent:#b44a2d;--accent-bg:#fdf0ec;--text:#2c2418;--text-muted:#8a7e6e;--border:#e0d8ca;--border-strong:#c4b8a4;--green:#3a7d44;--green-bg:#edf7ef;--red:#b44a2d;--red-bg:#fdf0ec;--blue:#2d6bb4;--shadow:0 2px 20px rgba(44,36,24,.06);--radius:12px;--radius-sm:8px;--font-display:'Noto Serif SC',serif;--font-mono:'JetBrains Mono',monospace}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-display);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
        .container{max-width:960px;margin:0 auto;padding:2.5rem 2rem 5rem}
        header{margin-bottom:1.8rem;padding-bottom:1.5rem;border-bottom:2px solid var(--text)}
        header h1{font-size:2rem;font-weight:700;margin-bottom:.3rem}
        header h1 span{color:var(--accent)}
        header p{color:var(--text-muted);font-size:.88rem}
        .nav{display:flex;gap:.75rem;margin-bottom:2rem}
        .nav a{padding:.45rem 1rem;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;text-decoration:none;border:1.5px solid var(--border-strong);color:var(--text);transition:all .2s}
        .nav a:hover,.nav a.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
        .section{margin-bottom:2rem}
        .section-label{font-size:.72rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin-bottom:.6rem;font-weight:500}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem;box-shadow:var(--shadow)}
        label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem}
        textarea{width:100%;min-height:120px;padding:.8rem;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-display);font-size:.88rem;line-height:1.7;background:var(--surface-alt);color:var(--text);resize:vertical;outline:none}
        textarea:focus{border-color:var(--accent)}
        input[type="number"],input[type="text"],input[type="password"]{width:100%;padding:.6rem .8rem;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:.85rem;background:var(--surface-alt);color:var(--text);outline:none}
        input:focus{border-color:var(--accent)}
        .form-row{margin-bottom:.8rem}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
        .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
        .form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.8rem}
        .browser-select{display:flex;gap:.5rem}
        .browser-opt{flex:1;padding:.6rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:all .2s;font-size:.85rem;font-weight:600}
        .browser-opt:hover{border-color:var(--accent)}
        .browser-opt.selected{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
        .browser-opt input{display:none}
        .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.4rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-primary{background:var(--text);color:var(--bg)}.btn-primary:hover{background:var(--accent)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
        .btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#2d8a36}
        .btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2456a0}
        .btn-red{background:transparent;color:var(--red);border:1.5px solid var(--red)}.btn-red:hover{background:var(--red-bg)}
        .btn-sm{padding:.4rem .8rem;font-size:.78rem}
        .btn-group{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .5s ease}
        .status-box{background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.8rem 1rem;font-size:.88rem;min-height:2em}
        .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.4rem;vertical-align:middle}
        .dot-green{background:var(--green)}.dot-yellow{background:#d4a72d}.dot-red{background:var(--red);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .steps{display:flex;gap:0;margin-bottom:1rem}
        .step{flex:1;padding:.5rem .3rem;text-align:center;font-size:.72rem;font-family:var(--font-mono);border-bottom:3px solid var(--border);color:var(--text-muted);transition:all .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .step.active{border-color:var(--accent);color:var(--accent);font-weight:600}
        .step.done{border-color:var(--green);color:var(--green)}
        .step-hint{background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.8rem 1rem;font-size:.85rem;line-height:1.7;margin-bottom:.8rem}
        .step-hint strong{color:var(--accent)}
        .step-hint .browser-tag{display:inline-block;background:var(--blue);color:#fff;font-size:.72rem;font-family:var(--font-mono);padding:1px 6px;border-radius:3px;margin-right:4px}
        .log-box{max-height:150px;overflow-y:auto;font-family:var(--font-mono);font-size:.75rem;color:var(--text-muted);background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem;margin-top:.6rem}
        .log-line{padding:.15rem 0;border-bottom:1px solid rgba(0,0,0,.04)}
        .collapse-toggle{font-size:.78rem;color:var(--text-muted);cursor:pointer;margin-bottom:.3rem;font-family:var(--font-mono)}
        .collapse-toggle:hover{color:var(--accent)}
        .progress-detail{display:flex;justify-content:space-between;font-size:.78rem;font-family:var(--font-mono);margin-top:.3rem;padding:.4rem .6rem;background:var(--surface-alt);border-radius:var(--radius-sm)}
        .progress-detail .done{color:var(--green)}
        .progress-detail .total{color:var(--accent);font-weight:600}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.2rem}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.8rem;text-align:center}
        .stat-value{font-size:1.4rem;font-weight:700;line-height:1;margin-bottom:.15rem}
        .stat-label{font-size:.65rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
        .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.8rem;overflow:hidden;opacity:0;animation:fadeUp .3s ease forwards}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .result-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;cursor:pointer}
        .result-header:hover{background:var(--surface-alt)}
        .badge{padding:.15rem .5rem;border-radius:20px;font-size:.72rem;font-family:var(--font-mono);font-weight:500}
        .badge-score{background:var(--accent-bg);color:var(--accent)}.badge-grade{background:var(--text);color:var(--bg)}.badge-error{background:var(--red-bg);color:var(--red)}
        .result-body{padding:0 1rem 1rem;font-size:.85rem;overflow:hidden;max-height:0;transition:max-height .3s ease}
        .result-body.open{max-height:600px}
        .locate-info{font-size:.82rem;font-family:var(--font-mono);color:var(--text-muted);padding:.4rem 0;line-height:1.6}
        @media(max-width:640px){.container{padding:1.5rem 1rem 3rem}header h1{font-size:1.5rem}.stats{grid-template-columns:1fr}.form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI改卷系统<span>o_o</span></h1>
            <p>自助阅卷系统 - 直接在浏览器中操作智学网</p>
        </header>
        <div class="nav">
            <a href="/">手动改卷</a>
            <a href="/auto" class="active">自动阅卷（智学网）</a>
        </div>
        <div class="steps">
            <div class="step" id="st1">配置</div>
            <div class="step" id="st2">登录</div>
            <div class="step" id="st3">阅卷页</div>
            <div class="step" id="st4">定位</div>
            <div class="step" id="st5">批改</div>
            <div class="step" id="st6">完成</div>
        </div>

        <!-- 步骤提示 -->
        <div class="step-hint" id="stepHint" style="display:none;"></div>

        <!-- API 配置 -->
        <div class="section">
            <div class="section-label">API 配置</div>
            <div class="card">
                <div class="form-grid-3">
                    <div class="form-row"><label>API Key</label><input type="password" id="apiKey" placeholder="填写你的 API Key"></div>
                    <div class="form-row"><label>API 地址</label><input type="text" id="apiBase" placeholder="https://ark.cn-beijing.volces.com/api/v3"></div>
                    <div class="form-row"><label>模型名称</label><input type="text" id="modelName" placeholder="doubao-seed-2-0-lite"></div>
                </div>
            </div>
        </div>

        <!-- 批改配置 -->
        <div class="section">
            <div class="section-label">批改配置</div>
            <div class="card">
                <div class="form-row"><label>参考答案与评分标准</label><textarea id="reference" placeholder="输入标准答案和评分标准..."></textarea></div>
                <div class="form-grid-4">
                    <div class="form-row"><label>满分</label><input type="number" id="maxScore" value="4" min="1" max="1000"></div>
                    <div class="form-row"><label>批改份数</label><input type="number" id="count" value="10" min="1" max="500"></div>
                    <div class="form-row"><label>浏览器</label>
                        <div class="browser-select">
                            <label class="browser-opt selected" onclick="pickBrowser(this)"><input type="radio" name="browser" value="chrome" checked>Chrome</label>
                            <label class="browser-opt" onclick="pickBrowser(this)"><input type="radio" name="browser" value="edge">Edge</label>
                        </div>
                    </div>
                    <div class="form-row"><label>定位方式</label>
                        <div class="browser-select">
                            <label class="browser-opt selected" onclick="pickLocate(this)"><input type="radio" name="locate" value="auto" checked>自动检测</label>
                            <label class="browser-opt" onclick="pickLocate(this)"><input type="radio" name="locate" value="manual">手动标记</label>
                        </div>
                    </div>
                    <div class="form-row" style="display:flex;align-items:end;">
                        <div class="btn-group" style="margin-top:0;width:100%;">
                            <button class="btn btn-primary" id="startBtn" onclick="startGrading()" style="width:100%;">开始自动阅卷</button>
                        </div>
                    </div>
                </div>
                <div class="btn-group" style="margin-top:0;">
                    <button class="btn btn-red" id="stopBtn" onclick="stopGrading()" style="display:none;">停止</button>
                </div>
            </div>
        </div>

        <!-- 状态 -->
        <div class="section" id="controlSection" style="display:none;">
            <div class="section-label">实时状态</div>
            <div class="card">
                <div class="status-box" id="statusBox"><span class="status-dot dot-yellow"></span>等待开始...</div>
                <div class="btn-group" id="actionBtns" style="display:none;"></div>
                <div class="progress-detail" id="progressDetail" style="display:none;">
                    <span>进度: <span class="done" id="pDone">0</span> / <span class="total" id="pTotal">0</span></span>
                    <span>满分: <span id="pMax">100</span>分</span>
                    <span id="pPercent">0%</span>
                </div>
                <div style="margin-top:.6rem;">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <div class="collapse-toggle" onclick="toggleRef()" id="refToggle" style="display:none;">展开/收起批改标准</div>
                <div id="refEditBox" style="display:none;margin-top:.4rem;">
                    <textarea id="refEdit" style="min-height:80px;font-size:.82rem;" placeholder="修改批改标准..."></textarea>
                    <div style="display:flex;gap:.5rem;margin-top:.4rem;align-items:center;">
                        <button class="btn btn-green btn-sm" onclick="saveReference()">保存更新</button>
                        <span id="refSaveStatus" style="font-size:.75rem;color:var(--green);"></span>
                    </div>
                </div>
                <div class="collapse-toggle" onclick="toggleLog()">展开/收起日志</div>
                <div class="log-box" id="logBox" style="display:none;"></div>
            </div>
        </div>

        <!-- 定位确认区域 -->
        <div class="section" id="locateSection" style="display:none;">
            <div class="section-label" id="locateLabel">元素定位</div>
            <div class="card">
                <div id="locateAuto" style="display:none;">
                    <div class="locate-info" id="detectedInfo">正在检测...</div>
                    <div class="btn-group">
                        <button class="btn btn-green" onclick="confirmLocate()">确认定位</button>
                        <button class="btn btn-blue" onclick="redoLocate()">重新检测</button>
                    </div>
                </div>
                <div id="locateManual" style="display:none;">
                    <div class="locate-info" id="manualHint">标记工具已注入浏览器页面</div>
                    <div id="manualStatus" class="locate-info"></div>
                    <div class="btn-group">
                        <button class="btn btn-green" id="confirmLocateBtn" onclick="confirmLocate()" style="display:none;">确认定位</button>
                        <button class="btn btn-blue btn-sm" onclick="redoLocate()">重新标记</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果 -->
        <div id="resultsSection" style="display:none;">
            <div class="section">
                <div class="section-label">批改结果</div>
                <div class="stats" id="stats"></div>
                <div id="results"></div>
            </div>
        </div>

        <!-- 历史结果 -->
        <div id="historySection" style="display:none;"></div>
    </div>

<script>
var pollTimer=null,logLines=[],curMaxScore=100,locateMode="auto",renderedCount=0,lastResultsLen=0;

// ============ localStorage 持久化 ============
var LS_PREFIX='ag_';
var LS_KEYS=['apiKey','apiBase','model','reference','maxScore','count','browser','locateMode'];

function saveFormToStorage(){
    try{
        localStorage.setItem(LS_PREFIX+'apiKey',document.getElementById('apiKey').value);
        localStorage.setItem(LS_PREFIX+'apiBase',document.getElementById('apiBase').value);
        localStorage.setItem(LS_PREFIX+'model',document.getElementById('modelName').value);
        localStorage.setItem(LS_PREFIX+'reference',document.getElementById('reference').value);
        localStorage.setItem(LS_PREFIX+'maxScore',document.getElementById('maxScore').value);
        localStorage.setItem(LS_PREFIX+'count',document.getElementById('count').value);
        var br=document.querySelector('input[name="browser"]:checked');
        if(br)localStorage.setItem(LS_PREFIX+'browser',br.value);
        localStorage.setItem(LS_PREFIX+'locateMode',locateMode);
    }catch(e){}
}

function loadFormFromStorage(){
    try{
        var v;
        v=localStorage.getItem(LS_PREFIX+'apiKey');if(v!==null)document.getElementById('apiKey').value=v;
        v=localStorage.getItem(LS_PREFIX+'apiBase');if(v!==null)document.getElementById('apiBase').value=v;
        v=localStorage.getItem(LS_PREFIX+'model');if(v!==null)document.getElementById('modelName').value=v;
        v=localStorage.getItem(LS_PREFIX+'reference');if(v!==null)document.getElementById('reference').value=v;
        v=localStorage.getItem(LS_PREFIX+'maxScore');if(v!==null)document.getElementById('maxScore').value=v;
        v=localStorage.getItem(LS_PREFIX+'count');if(v!==null)document.getElementById('count').value=v;
        v=localStorage.getItem(LS_PREFIX+'browser');
        if(v==='edge'){
            var opts=document.querySelectorAll('.browser-opt');
            opts.forEach(function(o){o.classList.remove('selected')});
            opts[1].classList.add('selected');opts[1].querySelector('input').checked=true;
        }
        v=localStorage.getItem(LS_PREFIX+'locateMode');
        if(v==='manual'){
            locateMode='manual';
            var groups=document.querySelectorAll('.browser-select');
            var locGroup=groups[1];
            if(locGroup){
                var locOpts=locGroup.querySelectorAll('.browser-opt');
                locOpts.forEach(function(o){o.classList.remove('selected')});
                locOpts[1].classList.add('selected');locOpts[1].querySelector('input').checked=true;
            }
        }
    }catch(e){}
}

// ============ 加载历史批改结果 ============
function loadLastSession(){
    fetch('/api/auto/last-session').then(function(r){return r.json()}).then(function(d){
        if(d.empty)return;
        var box=document.getElementById('historySection');
        if(!box)return;
        box.style.display='block';
        var html='<div class="card" style="margin-bottom:1.5rem;">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">';
        html+='<span style="font-size:.82rem;font-family:var(--font-mono);color:var(--text-muted);">上次批改: '+d.time+'</span>';
        html+='<span style="font-size:.72rem;font-family:var(--font-mono);color:var(--text-muted);">满分 '+d.max_score+'分</span></div>';
        html+='<div class="stats"><div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+d.avg_score+'</div><div class="stat-label">平均分/'+d.max_score+'</div></div>';
        html+='<div class="stat-card"><div class="stat-value" style="color:var(--green)">'+d.max_score_val+'</div><div class="stat-label">最高分/'+d.max_score+'</div></div>';
        html+='<div class="stat-card"><div class="stat-value" style="color:var(--red)">'+d.min_score_val+'</div><div class="stat-label">最低分/'+d.max_score+'</div></div></div>';
        html+='<div style="font-size:.78rem;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:.4rem;">成功 '+d.success+'/'+d.total+' 份</div>';
        if(d.recent_results&&d.recent_results.length>0){
            html+='<div style="font-size:.78rem;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:.3rem;">最近答卷:</div>';
            for(var i=0;i<Math.min(d.recent_results.length,5);i++){
                var r=d.recent_results[i];
                if(r.success&&r.data){
                    html+='<div style="font-size:.82rem;padding:.25rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">';
                    html+='<span>'+r.student+'</span><span class="badge badge-score">'+r.data.score+'/'+(r.data.max_score||d.max_score)+'</span></div>';
                }
            }
        }
        html+='</div>';
        box.innerHTML=html;
    }).catch(function(){});
}

function pickBrowser(el){document.querySelectorAll('.browser-opt').forEach(function(e){e.classList.remove('selected')});el.classList.add('selected');el.querySelector('input').checked=true}
function pickLocate(el){var group=el.closest('.browser-select');group.querySelectorAll('.browser-opt').forEach(function(e){e.classList.remove('selected')});el.classList.add('selected');el.querySelector('input').checked=true;locateMode=el.querySelector('input').value}
function toggleLog(){var b=document.getElementById('logBox');b.style.display=b.style.display==='none'?'block':'none'}
function toggleRef(){var b=document.getElementById('refEditBox');b.style.display=b.style.display==='none'?'block':'none'}

function saveReference(){
    var ref=document.getElementById('refEdit').value.trim();
    if(!ref){alert('批改标准不能为空');return}
    fetch('/api/auto/update-reference',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference:ref})})
    .then(function(r){return r.json()}).then(function(d){
        if(d.error){alert(d.error);return}
        document.getElementById('refSaveStatus').textContent='已更新 '+new Date().toLocaleTimeString();
        setTimeout(function(){document.getElementById('refSaveStatus').textContent=''},3000);
        addLog('批改标准已更新');
    });
}

function startGrading(){
    var apiKey=document.getElementById('apiKey').value.trim();
    var apiBase=document.getElementById('apiBase').value.trim();
    var model=document.getElementById('modelName').value.trim();
    var ref=document.getElementById('reference').value.trim();
    var ms=parseInt(document.getElementById('maxScore').value)||100;
    var cnt=parseInt(document.getElementById('count').value);
    var br=document.querySelector('input[name="browser"]:checked').value;
    if(!apiKey){alert('请填写 API Key');return}
    if(!apiBase){alert('请填写 API 地址');return}
    if(!model){alert('请填写模型名称');return}
    if(!ref){alert('请填写参考答案');return}
    if(!cnt||cnt<1){alert('请输入批改份数');return}
    curMaxScore=ms;
    renderedCount=0;lastResultsLen=0;
    document.getElementById('startBtn').disabled=true;
    document.getElementById('startBtn').innerHTML='<span class="spinner"></span> 启动中...';
    document.getElementById('stopBtn').style.display='inline-flex';
    document.getElementById('controlSection').style.display='block';
    document.getElementById('logBox').style.display='block';
    document.getElementById('progressDetail').style.display='flex';
    document.getElementById('pTotal').textContent=cnt;
    document.getElementById('pMax').textContent=ms;
    document.getElementById('refToggle').style.display='block';
    document.getElementById('refEdit').value=ref;
    document.getElementById('resultsSection').style.display='block';
    document.getElementById('results').innerHTML='';
    document.getElementById('stats').innerHTML='';
    logLines=[];addLog('正在启动（满分'+ms+'分，共'+cnt+'份）...');
    fetch('/api/auto/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference:ref,count:cnt,browser:br,api_key:apiKey,api_base:apiBase,model:model,max_score:ms,locate_mode:locateMode})}).then(function(r){return r.json()}).then(function(d){if(d.error){alert(d.error);resetBtn();return}pollTimer=setInterval(pollStatus,1500)}).catch(function(e){alert('启动失败: '+e.message);resetBtn()});
}
function resetBtn(){document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').innerHTML='开始自动阅卷';document.getElementById('stopBtn').style.display='none'}

function pollStatus(){fetch('/api/auto/status').then(function(r){return r.json()}).then(function(s){updateUI(s);if(s.message)addLog(s.message);if(s.status==='finished'||s.status==='error'||s.status==='idle'||s.status==='stopped'){clearInterval(pollTimer);resetBtn();updateStats(s.results||[]);setStep(6)}})}

function updateUI(s){
    document.getElementById('statusBox').innerHTML='<span class="status-dot '+dotClass(s.status)+'"></span>'+(s.message||'...');
    var idx={starting:1,login_waiting:2,auto_login_detected:2,login_confirmed:2,page_waiting:3,page_confirmed:3,detecting:4,locating:4,locate_confirmed:4,running:5,finished:6,error:6,idle:0,stopped:6}[s.status]||0;
    for(var i=1;i<=6;i++){var el=document.getElementById('st'+i);if(i<idx)el.className='step done';else if(i===idx)el.className='step active';else el.className='step'}
    updateStepHint(s);
    updateActionBtns(s);
    var ls=document.getElementById('locateSection');
    if(s.status==='locating'){
        ls.style.display='block';
        if(s.locate_mode==='auto'){
            document.getElementById('locateAuto').style.display='block';
            document.getElementById('locateManual').style.display='none';
            document.getElementById('locateLabel').textContent='自动定位确认（浏览器页面已高亮标记）';
            if(s.detected_info)renderDetectedInfo(s.detected_info);
        }else{
            document.getElementById('locateAuto').style.display='none';
            document.getElementById('locateManual').style.display='block';
            document.getElementById('locateLabel').textContent='手动标记定位';
            var phase=s.locate_phase||'';
            if(phase==='manual_mark_score'){document.getElementById('manualHint').innerHTML='<span class="browser-tag">浏览器</span>请在浏览器页面中点击<b>打分框</b>位置'}
            else if(phase==='manual_mark_submit'){document.getElementById('manualHint').innerHTML='<span class="browser-tag">浏览器</span>请在浏览器页面中点击<b>提交按钮</b>位置'}
            else if(phase==='manual_done'||phase==='awaiting_confirm'){document.getElementById('manualHint').innerHTML='标记完成，请确认';document.getElementById('confirmLocateBtn').style.display='inline-flex'}
            if(s.score_pos)document.getElementById('manualStatus').innerHTML='<span style="color:var(--green)">✓ 打分框: ('+s.score_pos.x+', '+s.score_pos.y+')</span>'+(s.submit_pos?'<br><span style="color:var(--green)">✓ 提交按钮: ('+s.submit_pos.x+', '+s.submit_pos.y+')</span>':'');
        }
    }else{ls.style.display='none'}
    if(s.total>0){
        var pct=Math.round((s.progress/s.total)*100);
        document.getElementById('progressFill').style.width=pct+'%';
        document.getElementById('pDone').textContent=s.progress;
        document.getElementById('pTotal').textContent=s.total;
        document.getElementById('pPercent').textContent=pct+'%';
    }
    if(s.max_score){curMaxScore=s.max_score;document.getElementById('pMax').textContent=s.max_score}
    if(s.results&&s.results.length>0)appendResults(s.results);
}

function updateStepHint(s){
    var h=document.getElementById('stepHint');
    var msgs={
        starting:'正在启动浏览器，请稍候...',
        login_waiting:'<span class="browser-tag">浏览器</span>请在<b>浏览器窗口</b>中登录智学网。登录完成后，在此网页点击「已登录」。',
        auto_login_detected:'<span class="browser-tag">浏览器</span>检测到已登录，请确认。',
        login_confirmed:'登录已确认，正在跳转...',
        page_waiting:'<span class="browser-tag">浏览器</span>请在<b>浏览器窗口</b>中进入阅卷页面（能看到答题卡和评分区域），完成后在此网页点击「页面就绪」。',
        page_confirmed:'页面已确认，正在分析...',
        detecting:'正在分析页面元素...',
        locating: s.locate_mode==='auto'?'自动检测完成，请在下方确认定位结果。':'<span class="browser-tag">浏览器</span>请在<b>浏览器页面</b>上点击标记打分框和提交按钮位置。',
        running:'批改进行中，可随时修改批改标准。',
        finished:'批改已完成！',
        error:'出现错误，请检查日志。'
    };
    var msg=msgs[s.status];
    if(msg){h.innerHTML=msg;h.style.display='block'}else{h.style.display='none'}
}

function updateActionBtns(s){
    var box=document.getElementById('actionBtns');
    box.innerHTML='';box.style.display='none';
    if(s.status==='login_waiting'||s.status==='auto_login_detected'){
        box.style.display='flex';
        box.innerHTML='<button class="btn btn-green" onclick="confirmLogin()">已登录</button>';
    }else if(s.status==='page_waiting'){
        box.style.display='flex';
        box.innerHTML='<button class="btn btn-blue" onclick="confirmReady()">页面就绪</button>';
    }
}

function dotClass(st){if(st==='finished')return 'dot-green';if(st==='error'||st==='stopped')return 'dot-red';return 'dot-yellow'}
function setStep(n){for(var i=1;i<=6;i++){var el=document.getElementById('st'+i);if(i<n)el.className='step done';else if(i===n)el.className='step active';else el.className='step'}}
function renderDetectedInfo(info){
    var html='<div style="margin-bottom:.4rem"><b>检测模式:</b> ';
    if(info.score_mode==='buttons'){html+='数字评分按钮';if(info.buttons)html+=' ('+info.buttons.join(', ')+')'}
    else if(info.score_mode==='input'){html+='输入框'}
    else{html+='未检测到'}
    html+='</div>';
    if(info.in_iframe)html+='<div style="margin-bottom:.4rem"><b>位置:</b> iframe #'+info.iframe_index+'</div>';
    if(info.score_element){
        var se=info.score_element;
        html+='<div style="margin-bottom:.4rem"><b>打分元素:</b> '+(se.text||se.type||'')+' ('+se.x+','+se.y+')</div>';
    }
    if(info.submit_element){
        var su=info.submit_element;
        html+='<div style="margin-bottom:.4rem"><b>提交按钮:</b> '+su.text+' ('+su.x+','+su.y+')</div>';
    }
    document.getElementById('detectedInfo').innerHTML=html;
}
function addLog(msg){var t=new Date().toLocaleTimeString();logLines.push('['+t+'] '+msg);if(logLines.length>100)logLines=logLines.slice(-50);var box=document.getElementById('logBox');box.innerHTML=logLines.map(function(l){return '<div class="log-line">'+l+'</div>'}).join('');box.scrollTop=box.scrollHeight}

function confirmLogin(){fetch('/api/auto/confirm-login',{method:'POST'});addLog('已确认登录')}
function confirmReady(){fetch('/api/auto/confirm-ready',{method:'POST'});addLog('已确认页面就绪')}
function confirmLocate(){fetch('/api/auto/confirm-locate',{method:'POST'});addLog('已确认定位')}
function redoLocate(){fetch('/api/auto/redo-locate',{method:'POST'});addLog('重新检测中...')}
function stopGrading(){fetch('/api/auto/stop',{method:'POST'}).then(function(){document.getElementById('stopBtn').style.display='none';addLog('已停止')})}

// ============ 增量结果渲染 ============

function appendResults(results){
    var rd=document.getElementById('results');
    // 更新或追加结果
    for(var i=renderedCount;i<results.length;i++){
        var r=results[i],id='ar-'+i;
        var card=document.createElement('div');card.className='result-card';card.id=id;
        if(!r.success){
            card.innerHTML='<div class="result-header" onclick="this.parentElement.querySelector(\'.result-body\').classList.toggle(\'open\')"><span>'+r.student+'</span><span class="badge badge-error">失败: '+r.error+'</span></div><div class="result-body"></div>';
        }else{
            var d=r.data;
            card.innerHTML='<div class="result-header" onclick="this.parentElement.querySelector(\'.result-body\').classList.toggle(\'open\')"><span>'+r.student+'</span><div style="display:flex;gap:.4rem;align-items:center"><span class="badge badge-score">'+d.score+'/'+(d.max_score||curMaxScore)+'</span><span class="badge badge-grade">'+d.grade+'</span><span style="font-size:.65rem;color:var(--text-muted)">▸</span></div></div><div class="result-body"><div style="margin-bottom:.4rem"><b>识别:</b> '+(d.recognized_text||'')+'</div><div style="margin-bottom:.4rem"><b>评价:</b> '+(d.summary||'')+'</div><div><b>评语:</b> '+(d.detailed_comment||'')+'</div></div>';
        }
        rd.appendChild(card);
    }
    renderedCount=results.length;
    // 更新最后一个结果（重试可能改变状态）
    if(results.length>0&&results.length===lastResultsLen){
        var last=results[results.length-1];
        var lastCard=document.getElementById('ar-'+(results.length-1));
        if(lastCard&&last.success){
            var d=last.data;
            lastCard.innerHTML='<div class="result-header" onclick="this.parentElement.querySelector(\'.result-body\').classList.toggle(\'open\')"><span>'+last.student+'</span><div style="display:flex;gap:.4rem;align-items:center"><span class="badge badge-score">'+d.score+'/'+(d.max_score||curMaxScore)+'</span><span class="badge badge-grade">'+d.grade+'</span><span style="font-size:.65rem;color:var(--text-muted)">▸</span></div></div><div class="result-body"><div style="margin-bottom:.4rem"><b>识别:</b> '+(d.recognized_text||'')+'</div><div style="margin-bottom:.4rem"><b>评价:</b> '+(d.summary||'')+'</div><div><b>评语:</b> '+(d.detailed_comment||'')+'</div></div>';
        }
    }
    lastResultsLen=results.length;
    updateStats(results);
}

function updateStats(results){
    var sd=document.getElementById('stats');
    var ok=results.filter(function(r){return r.success});
    if(ok.length===0){sd.innerHTML='';return}
    var avg=Math.round(ok.reduce(function(s,r){return s+(r.data.score||0)},0)/ok.length);
    var mx=Math.max.apply(null,ok.map(function(r){return r.data.score||0}));
    var mn=Math.min.apply(null,ok.map(function(r){return r.data.score||0}));
    sd.innerHTML='<div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+avg+'</div><div class="stat-label">平均分/'+curMaxScore+'</div></div><div class="stat-card"><div class="stat-value" style="color:var(--green)">'+mx+'</div><div class="stat-label">最高分/'+curMaxScore+'</div></div><div class="stat-card"><div class="stat-value" style="color:var(--red)">'+mn+'</div><div class="stat-label">最低分/'+curMaxScore+'</div></div>';
}

// ============ 页面初始化 ============
document.addEventListener('DOMContentLoaded',function(){
    loadFormFromStorage();
    loadLastSession();
});

// startGrading 时保存表单
var _origStartGrading=startGrading;
startGrading=function(){
    saveFormToStorage();
    _origStartGrading();
};
</script>
