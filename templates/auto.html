<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI改卷系统</title>
    <style>
        :root{--bg:#f5f5f7;--surface:#fff;--text:#1d1d1f;--text-secondary:#86868b;--accent:#0071e3;--accent-hover:#0077ed;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--border:rgba(0,0,0,.08);--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:16px;--radius-sm:10px;--radius-xs:8px;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC',sans-serif;--font-mono:'SF Mono','Menlo','Monaco','Consolas',monospace;--transition:all .25s cubic-bezier(.4,0,.2,1)}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        .container{max-width:920px;margin:0 auto;padding:2rem 1.5rem 4rem}
        header{margin-bottom:2rem;padding-bottom:1.5rem}
        header h1{font-size:2.2rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:.35rem}
        header h1 span{color:var(--accent)}
        header p{color:var(--text-secondary);font-size:.92rem;font-weight:400}
        .nav{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--surface);border-radius:var(--radius-sm);padding:4px;box-shadow:var(--shadow);width:fit-content}
        .nav a{padding:.5rem 1.1rem;border-radius:var(--radius-xs);font-size:.82rem;font-weight:600;text-decoration:none;color:var(--text-secondary);transition:var(--transition)}
        .nav a:hover{color:var(--text);background:rgba(0,0,0,.04)}
        .nav a.active{color:#fff;background:var(--accent);box-shadow:0 1px 4px rgba(0,113,227,.3)}
        .section{margin-bottom:1.5rem}
        .section-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);margin-bottom:.5rem;font-weight:600}
        .card{background:var(--surface);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow)}
        label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.35rem;color:var(--text)}
        textarea{width:100%;min-height:120px;padding:.75rem 1rem;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.88rem;line-height:1.7;background:rgba(0,0,0,.03);color:var(--text);resize:vertical;outline:none;transition:var(--transition)}
        textarea:focus{background:var(--surface);box-shadow:0 0 0 3px rgba(0,113,227,.18)}
        input[type="number"],input[type="text"],input[type="password"]{width:100%;padding:.6rem .85rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:.82rem;background:rgba(0,0,0,.03);color:var(--text);outline:none;transition:var(--transition)}
        input:focus{background:var(--surface);box-shadow:0 0 0 3px rgba(0,113,227,.18)}
        input::placeholder,textarea::placeholder{color:var(--text-secondary)}
        .form-row{margin-bottom:.75rem}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
        .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
        .form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.75rem}
        .seg-ctrl{display:flex;background:rgba(0,0,0,.04);border-radius:var(--radius-xs);padding:3px;gap:2px}
        .seg-opt{flex:1;padding:.5rem;border-radius:7px;text-align:center;cursor:pointer;transition:var(--transition);font-size:.82rem;font-weight:600;color:var(--text-secondary);user-select:none}
        .seg-opt:hover{color:var(--text);background:rgba(0,0,0,.03)}
        .seg-opt.selected{color:var(--accent);background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.1)}
        .seg-opt input{display:none}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.3rem;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--transition);letter-spacing:-.01em}
        .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,113,227,.25)}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#2db84e;transform:translateY(-1px)}
        .btn-blue{background:var(--accent);color:#fff}.btn-blue:hover{background:var(--accent-hover);transform:translateY(-1px)}
        .btn-red{background:rgba(255,59,48,.1);color:var(--red)}.btn-red:hover{background:rgba(255,59,48,.18)}
        .btn-sm{padding:.4rem .8rem;font-size:.78rem;border-radius:var(--radius-xs)}
        .btn-group{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .progress-bar{width:100%;height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#40a9ff);border-radius:2px;width:0%;transition:width .5s ease}
        .status-box{background:rgba(0,0,0,.03);border-radius:var(--radius-sm);padding:.75rem 1rem;font-size:.85rem;min-height:2em;display:flex;align-items:center;gap:.5rem}
        .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .dot-green{background:var(--green)}.dot-yellow{background:var(--orange)}.dot-red{background:var(--red);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .steps{display:flex;gap:0;margin-bottom:1.25rem;background:var(--surface);border-radius:var(--radius);padding:.75rem 1rem;box-shadow:var(--shadow)}
        .step{flex:1;text-align:center;font-size:.7rem;font-weight:600;color:var(--text-secondary);position:relative;padding-bottom:.5rem;transition:var(--transition);letter-spacing:.02em}
        .step::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:3px;border-radius:2px;background:rgba(0,0,0,.06);transition:var(--transition)}
        .step.active{color:var(--accent)}.step.active::after{background:var(--accent)}
        .step.done{color:var(--green)}.step.done::after{background:var(--green)}
        .step-hint{background:var(--surface);border-radius:var(--radius-sm);padding:.75rem 1rem;font-size:.85rem;line-height:1.6;margin-bottom:.75rem;box-shadow:var(--shadow);color:var(--text-secondary)}
        .step-hint strong{color:var(--accent);font-weight:600}
        .step-hint .browser-tag{display:inline-block;background:var(--accent);color:#fff;font-size:.68rem;font-weight:600;padding:1px 7px;border-radius:4px;margin-right:4px}
        .log-box{max-height:150px;overflow-y:auto;font-family:var(--font-mono);font-size:.72rem;color:var(--text-secondary);background:rgba(0,0,0,.02);border-radius:var(--radius-xs);padding:.6rem;margin-top:.6rem}
        .log-line{padding:.12rem 0;border-bottom:1px solid rgba(0,0,0,.03)}
        .collapse-toggle{font-size:.75rem;color:var(--text-secondary);cursor:pointer;margin-bottom:.3rem;font-weight:500;user-select:none}
        .collapse-toggle:hover{color:var(--accent)}
        .progress-detail{display:flex;justify-content:space-between;font-size:.75rem;font-family:var(--font-mono);margin-top:.4rem;padding:.4rem .7rem;background:rgba(0,0,0,.02);border-radius:var(--radius-xs)}
        .progress-detail .done{color:var(--green);font-weight:600}
        .progress-detail .total{color:var(--accent);font-weight:600}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
        .stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:1rem;text-align:center;box-shadow:var(--shadow)}
        .stat-value{font-size:1.6rem;font-weight:700;line-height:1;margin-bottom:.2rem;letter-spacing:-.02em}
        .stat-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);font-weight:500}
        .result-card{background:var(--surface);border-radius:var(--radius);margin-bottom:.6rem;overflow:hidden;opacity:0;animation:fadeUp .3s ease forwards;box-shadow:var(--shadow)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .result-header{display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;cursor:pointer;transition:var(--transition)}
        .result-header:hover{background:rgba(0,0,0,.02)}
        .badge{padding:.15rem .55rem;border-radius:6px;font-size:.7rem;font-weight:600;letter-spacing:.01em}
        .badge-score{background:rgba(0,113,227,.1);color:var(--accent)}.badge-grade{background:var(--text);color:#fff}.badge-error{background:rgba(255,59,48,.1);color:var(--red)}
        .result-body{padding:0 1rem 1rem;font-size:.83rem;overflow:hidden;max-height:0;transition:max-height .3s ease}
        .result-body.open{max-height:600px}
        .locate-info{font-size:.82rem;color:var(--text-secondary);padding:.4rem 0;line-height:1.6}
        .btn-group-wide{display:flex;gap:.5rem;margin-top:.75rem}
        .btn-group-wide .btn{flex:1}
        .settings-toggle{display:none;margin-bottom:1rem}
.settings-toggle .btn{width:100%;justify-content:center;background:var(--surface);color:var(--text-secondary);box-shadow:var(--shadow);font-size:.8rem;padding:.45rem .8rem}
.settings-toggle .btn:hover{color:var(--accent);background:rgba(0,113,227,.04)}
        @media(max-width:640px){.container{padding:1.25rem 1rem 3rem}header h1{font-size:1.6rem}.stats{grid-template-columns:1fr}.form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr}.steps{overflow-x:auto}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI<span>改卷</span>系统</h1>
            <p>自动阅卷 - 浏览器操作智学网</p>
        </header>
        <div class="nav">
            <a href="/">手动改卷</a>
            <a href="/auto" class="active">自动阅卷</a>
        </div>
        <div class="steps">
            <div class="step" id="st1">配置</div>
            <div class="step" id="st2">登录</div>
            <div class="step" id="st3">阅卷页</div>
            <div class="step" id="st4">定位</div>
            <div class="step" id="st5">批改</div>
            <div class="step" id="st6">完成</div>
        </div>

        <div class="step-hint" id="stepHint" style="display:none;"></div>

                <!-- 设置区域（任务启动后可折叠） -->
        <div id="settingsSection"><!-- API 配置 -->
        <div class="section">
            <div class="section-label">API 配置</div>
            <div class="card">
                <div class="form-grid-3">
                    <div class="form-row"><label>API Key</label><input type="password" id="apiKey" placeholder="输入密钥"></div>
                    <div class="form-row"><label>API 地址</label><input type="text" id="apiBase" placeholder="https://ark.cn-beijing.volces.com/api/v3"></div>
                    <div class="form-row"><label>模型名称</label><input type="text" id="modelName" placeholder="doubao-seed-2-0-lite"></div>
                </div>
            </div>
        </div>

        <!-- 批改配置 -->
        <div class="section">
            <div class="section-label">批改配置</div>
            <div class="card">
                <div class="form-row"><label>目标网址</label><input type="text" id="targetUrl" placeholder="https://www.zhixue.com" value="https://www.zhixue.com"></div>
                <div class="form-row"><label>参考答案与评分标准</label><textarea id="reference" placeholder="输入标准答案和评分标准..."></textarea></div>
                <div class="form-grid-4">
                    <div class="form-row"><label>满分</label><input type="number" id="maxScore" value="4" min="1" max="1000"></div>
                    <div class="form-row"><label>批改份数</label><input type="number" id="count" value="10" min="1" max="500"></div>
                    <div class="form-row"><label>浏览器</label>
                        <div class="seg-ctrl">
                            <label class="seg-opt selected" onclick="pickBrowser(this)"><input type="radio" name="browser" value="chrome" checked>Chrome</label>
                            <label class="seg-opt" onclick="pickBrowser(this)"><input type="radio" name="browser" value="edge">Edge</label>
                        </div>
                    </div>
                    <div class="form-row"><label>定位方式</label>
                        <div class="seg-ctrl">
                            <label class="seg-opt selected" onclick="pickLocate(this)"><input type="radio" name="locate" value="auto" checked>自动</label>
                            <label class="seg-opt" onclick="pickLocate(this)"><input type="radio" name="locate" value="manual">手动</label>
                        </div>
                    </div>
                </div>
                <div class="btn-group-wide">
                    <button class="btn btn-primary" id="startBtn" onclick="startGrading()">开始自动阅卷</button>
                    <button class="btn btn-red" id="stopBtn" onclick="stopGrading()" style="display:none;">停止</button>
                </div>
            </div>
        </div>

                </div><!-- /settingsSection -->

        <!-- 设置折叠切换按钮（任务启动后显示） -->
        <div class="settings-toggle" id="settingsToggle">
            <button class="btn" onclick="toggleSettings()">▶ 显示配置</button>
        </div>
<!-- 状态 -->
        <div class="section" id="controlSection" style="display:none;">
            <div class="section-label">实时状态</div>
            <div class="card">
                <div class="status-box" id="statusBox"><span class="status-dot dot-yellow"></span>等待开始...</div>
                <div class="btn-group" id="actionBtns" style="display:none;"></div>
                <div class="progress-detail" id="progressDetail" style="display:none;">
                    <span>进度 <span class="done" id="pDone">0</span> / <span class="total" id="pTotal">0</span></span>
                    <span>满分 <span id="pMax">100</span> 分</span>
                    <span id="pPercent">0%</span>
                </div>
                <div style="margin-top:.5rem;">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <div class="collapse-toggle" onclick="toggleRef()" id="refToggle" style="display:none;margin-top:.6rem;">批改标准</div>
                <div id="refEditBox" style="display:none;margin-top:.4rem;">
                    <textarea id="refEdit" style="min-height:80px;font-size:.82rem;" placeholder="修改批改标准..."></textarea>
                    <div style="display:flex;gap:.5rem;margin-top:.4rem;align-items:center;">
                        <button class="btn btn-green btn-sm" onclick="saveReference()">保存更新</button>
                        <span id="refSaveStatus" style="font-size:.72rem;color:var(--green);"></span>
                    </div>
                </div>
                <div class="collapse-toggle" onclick="toggleLog()" style="margin-top:.4rem;">日志</div>
                <div class="log-box" id="logBox" style="display:none;"></div>
            </div>
        </div>

        <!-- 定位确认区域 -->
        <div class="section" id="locateSection" style="display:none;">
            <div class="section-label" id="locateLabel">元素定位</div>
            <div class="card">
                <div id="locateAuto" style="display:none;">
                    <div class="locate-info" id="detectedInfo">正在检测...</div>
                    <div class="btn-group">
                        <button class="btn btn-green" onclick="confirmLocate()">确认定位</button>
                        <button class="btn btn-blue" onclick="redoLocate()">重新检测</button>
                    </div>
                </div>
                <div id="locateManual" style="display:none;">
                    <div class="locate-info" id="manualHint">请在浏览器页面上标记位置</div>
                    <div id="manualStatus" class="locate-info"></div>
                    <div class="btn-group">
                        <button class="btn btn-green" id="confirmLocateBtn" onclick="confirmLocate()" style="display:none;">确认定位</button>
                        <button class="btn btn-blue btn-sm" onclick="redoLocate()">重新标记</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果 -->
        <div id="resultsSection" style="display:none;">
            <div class="section">
                <div class="section-label">批改结果</div>
                <div class="stats" id="stats"></div>
                <div id="results"></div>
            </div>
        </div>

        <!-- 历史结果 -->
        <div id="historySection" style="display:none;"></div>
    </div>

<script>
var pollTimer=null,logLines=[],curMaxScore=100,locateMode="auto",renderedCount=0,lastResultsLen=0;

// ============ localStorage 持久化 ============
var LS_PREFIX='ag_';

function saveFormToStorage(){
    try{
        localStorage.setItem(LS_PREFIX+'apiKey',document.getElementById('apiKey').value);
        localStorage.setItem(LS_PREFIX+'apiBase',document.getElementById('apiBase').value);
        localStorage.setItem(LS_PREFIX+'model',document.getElementById('modelName').value);
        localStorage.setItem(LS_PREFIX+'reference',document.getElementById('reference').value);
        localStorage.setItem(LS_PREFIX+'maxScore',document.getElementById('maxScore').value);
        localStorage.setItem(LS_PREFIX+'count',document.getElementById('count').value);
        localStorage.setItem(LS_PREFIX+'targetUrl',document.getElementById('targetUrl').value);
        var br=document.querySelector('input[name="browser"]:checked');
        if(br)localStorage.setItem(LS_PREFIX+'browser',br.value);
        localStorage.setItem(LS_PREFIX+'locateMode',locateMode);
    }catch(e){}
}

function loadFormFromStorage(){
    try{
        var v;
        v=localStorage.getItem(LS_PREFIX+'apiKey');if(v!==null)document.getElementById('apiKey').value=v;
        v=localStorage.getItem(LS_PREFIX+'apiBase');if(v!==null)document.getElementById('apiBase').value=v;
        v=localStorage.getItem(LS_PREFIX+'model');if(v!==null)document.getElementById('modelName').value=v;
        v=localStorage.getItem(LS_PREFIX+'reference');if(v!==null)document.getElementById('reference').value=v;
        v=localStorage.getItem(LS_PREFIX+'maxScore');if(v!==null)document.getElementById('maxScore').value=v;
        v=localStorage.getItem(LS_PREFIX+'count');if(v!==null)document.getElementById('count').value=v;
        v=localStorage.getItem(LS_PREFIX+'targetUrl');if(v!==null)document.getElementById('targetUrl').value=v;
        v=localStorage.getItem(LS_PREFIX+'browser');
        if(v==='edge'){
            var segs=document.querySelectorAll('.seg-ctrl');
            var browserSeg=segs[0];
            if(browserSeg){
                var opts=browserSeg.querySelectorAll('.seg-opt');
                opts.forEach(function(o){o.classList.remove('selected')});
                opts[1].classList.add('selected');opts[1].querySelector('input').checked=true;
            }
        }
        v=localStorage.getItem(LS_PREFIX+'locateMode');
        if(v==='manual'){
            locateMode='manual';
            var segs=document.querySelectorAll('.seg-ctrl');
            var locSeg=segs[1];
            if(locSeg){
                var locOpts=locSeg.querySelectorAll('.seg-opt');
                locOpts.forEach(function(o){o.classList.remove('selected')});
                locOpts[1].classList.add('selected');locOpts[1].querySelector('input').checked=true;
            }
        }
    }catch(e){}
}

function loadLastSession(){
    fetch('/api/auto/last-session').then(function(r){return r.json()}).then(function(d){
        if(d.empty)return;
        var box=document.getElementById('historySection');
        if(!box)return;
        box.style.display='block';
        var html='<div class="section"><div class="section-label">上次批改</div><div class="card">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">';
        html+='<span style="font-size:.78rem;color:var(--text-secondary)">'+d.time+'</span>';
        html+='<span style="font-size:.72rem;color:var(--text-secondary)">满分 '+d.max_score+' 分</span></div>';
        html+='<div class="stats"><div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+d.avg_score+'</div><div class="stat-label">平均分/'+d.max_score+'</div></div>';
        html+='<div class="stat-card"><div class="stat-value" style="color:var(--green)">'+d.max_score_val+'</div><div class="stat-label">最高分/'+d.max_score+'</div></div>';
        html+='<div class="stat-card"><div class="stat-value" style="color:var(--red)">'+d.min_score_val+'</div><div class="stat-label">最低分/'+d.max_score+'</div></div></div>';
        html+='<div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:.5rem;">成功 '+d.success+'/'+d.total+' 份</div>';
        if(d.recent_results&&d.recent_results.length>0){
            for(var i=0;i<Math.min(d.recent_results.length,5);i++){
                var r=d.recent_results[i];
                if(r.success&&r.data){
                    html+='<div style="font-size:.82rem;padding:.3rem 0;border-bottom:1px solid rgba(0,0,0,.04);display:flex;justify-content:space-between;align-items:center;">';
                    html+='<span>'+r.student+'</span><span class="badge badge-score">'+r.data.score+'/'+(r.data.max_score||d.max_score)+'</span></div>';
                }
            }
        }
        html+='</div></div>';
        box.innerHTML=html;
    }).catch(function(){});
}

function toggleSettings(){
    var sec=document.getElementById('settingsSection');
    var tog=document.getElementById('settingsToggle');
    if(sec.style.display==='none'){
        sec.style.display='block';
        tog.style.display='none';
    }else{
        sec.style.display='none';
        tog.style.display='block';
    }
}
function scrollToAction(){
    /* 自动滚动到操作区域，确保用户无需手动上翻 */
    var el=document.getElementById('controlSection');
    if(el&&el.style.display!=='none'){el.scrollIntoView({behavior:'smooth',block:'start'})}
}
function pickBrowser(el){var group=el.closest('.seg-ctrl');group.querySelectorAll('.seg-opt').forEach(function(e){e.classList.remove('selected')});el.classList.add('selected');el.querySelector('input').checked=true}
function pickLocate(el){var group=el.closest('.seg-ctrl');group.querySelectorAll('.seg-opt').forEach(function(e){e.classList.remove('selected')});el.classList.add('selected');el.querySelector('input').checked=true;locateMode=el.querySelector('input').value}
function toggleLog(){var b=document.getElementById('logBox');b.style.display=b.style.display==='none'?'block':'none'}
function toggleRef(){var b=document.getElementById('refEditBox');b.style.display=b.style.display==='none'?'block':'none'}

function saveReference(){
    var ref=document.getElementById('refEdit').value.trim();
    if(!ref){alert('批改标准不能为空');return}
    fetch('/api/auto/update-reference',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference:ref})})
    .then(function(r){return r.json()}).then(function(d){
        if(d.error){alert(d.error);return}
        document.getElementById('refSaveStatus').textContent='已更新 '+new Date().toLocaleTimeString();
        setTimeout(function(){document.getElementById('refSaveStatus').textContent=''},3000);
        addLog('批改标准已更新');
    });
}

function startGrading(){
    saveFormToStorage();
    var apiKey=document.getElementById('apiKey').value.trim();
    var apiBase=document.getElementById('apiBase').value.trim();
    var model=document.getElementById('modelName').value.trim();
    var ref=document.getElementById('reference').value.trim();
    var ms=parseInt(document.getElementById('maxScore').value)||100;
    var cnt=parseInt(document.getElementById('count').value);
    var br=document.querySelector('input[name="browser"]:checked').value;
    var targetUrl=document.getElementById('targetUrl').value.trim()||'https://www.zhixue.com';
    if(!apiKey){alert('请填写 API Key');return}
    if(!apiBase){alert('请填写 API 地址');return}
    if(!model){alert('请填写模型名称');return}
    if(!ref){alert('请填写参考答案');return}
    if(!cnt||cnt<1){alert('请输入批改份数');return}
    curMaxScore=ms;
    renderedCount=0;lastResultsLen=0;
    document.getElementById('startBtn').disabled=true;
    document.getElementById('startBtn').innerHTML='<span class="spinner"></span> 启动中...';
    document.getElementById('stopBtn').style.display='inline-flex';
    document.getElementById('controlSection').style.display='block';
    document.getElementById('logBox').style.display='block';
    document.getElementById('progressDetail').style.display='flex';
    document.getElementById('pTotal').textContent=cnt;
    document.getElementById('pMax').textContent=ms;
    document.getElementById('refToggle').style.display='block';
    document.getElementById('refEdit').value=ref;
    document.getElementById('resultsSection').style.display='block';
    document.getElementById('results').innerHTML='';
    document.getElementById('stats').innerHTML='';
    document.getElementById('settingsSection').style.display='none';
    document.getElementById('settingsToggle').style.display='block';
    logLines=[];addLog('正在启动（满分'+ms+'分，共'+cnt+'份）...');
    fetch('/api/auto/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference:ref,count:cnt,browser:br,api_key:apiKey,api_base:apiBase,model:model,max_score:ms,locate_mode:locateMode,target_url:targetUrl})}).then(function(r){return r.json()}).then(function(d){if(d.error){alert(d.error);resetBtn();return}pollTimer=setInterval(pollStatus,1500)}).catch(function(e){alert('启动失败: '+e.message);resetBtn()});
}
function resetBtn(){document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').innerHTML='开始自动阅卷';document.getElementById('stopBtn').style.display='none';document.getElementById('settingsSection').style.display='block';document.getElementById('settingsToggle').style.display='none'}

function pollStatus(){fetch('/api/auto/status').then(function(r){return r.json()}).then(function(s){updateUI(s);if(s.message)addLog(s.message);if(s.status==='finished'||s.status==='error'||s.status==='idle'||s.status==='stopped'){clearInterval(pollTimer);resetBtn();updateStats(s.results||[]);setStep(6)}})}

function updateUI(s){
    document.getElementById('statusBox').innerHTML='<span class="status-dot '+dotClass(s.status)+'"></span>'+(s.message||'...');
    var idx={starting:1,login_waiting:2,auto_login_detected:2,login_confirmed:2,page_waiting:3,page_confirmed:3,detecting:4,locating:4,locate_confirmed:4,running:5,finished:6,error:6,idle:0,stopped:6}[s.status]||0;
    for(var i=1;i<=6;i++){var el=document.getElementById('st'+i);if(i<idx)el.className='step done';else if(i===idx)el.className='step active';else el.className='step'}
    updateStepHint(s);
    updateActionBtns(s);
    var ls=document.getElementById('locateSection');
    if(s.status==='locating'){scrollToAction();
        ls.style.display='block';
        if(s.locate_mode==='auto'){
            document.getElementById('locateAuto').style.display='block';
            document.getElementById('locateManual').style.display='none';
            document.getElementById('locateLabel').textContent='自动定位确认';
            if(s.detected_info)renderDetectedInfo(s.detected_info);
        }else{
            document.getElementById('locateAuto').style.display='none';
            document.getElementById('locateManual').style.display='block';
            document.getElementById('locateLabel').textContent='手动标记定位';
            var phase=s.locate_phase||'';
            if(phase==='manual_mark_score'){document.getElementById('manualHint').innerHTML='请在浏览器页面中点击<b>打分框</b>位置';document.getElementById('confirmLocateBtn').style.display='none'}
            else if(phase==='manual_mark_submit'){document.getElementById('manualHint').innerHTML='请在浏览器页面中点击<b>提交按钮</b>位置';document.getElementById('confirmLocateBtn').style.display='none'}
            else if(phase==='manual_done'||phase==='awaiting_confirm'){document.getElementById('manualHint').innerHTML='标记完成，请确认';document.getElementById('confirmLocateBtn').style.display='inline-flex'}
            if(s.score_pos)document.getElementById('manualStatus').innerHTML='<span style="color:var(--green)">打分框 ('+s.score_pos.x+', '+s.score_pos.y+')</span>'+(s.submit_pos?' &nbsp;<span style="color:var(--green)">提交按钮 ('+s.submit_pos.x+', '+s.submit_pos.y+')</span>':'');
        }
    }else{ls.style.display='none'}
    if(s.total>0){
        var pct=Math.round((s.progress/s.total)*100);
        document.getElementById('progressFill').style.width=pct+'%';
        document.getElementById('pDone').textContent=s.progress;
        document.getElementById('pTotal').textContent=s.total;
        document.getElementById('pPercent').textContent=pct+'%';
    }
    if(s.max_score){curMaxScore=s.max_score;document.getElementById('pMax').textContent=s.max_score}
    if(s.results&&s.results.length>0)appendResults(s.results);
}

function updateStepHint(s){
    var h=document.getElementById('stepHint');
    var msgs={
        starting:'正在启动浏览器...',
        login_waiting:'<span class="browser-tag">浏览器</span>请在<b>浏览器窗口</b>中登录。',
        auto_login_detected:'<span class="browser-tag">浏览器</span>检测到已登录，正在跳转...',
        login_confirmed:'登录已确认，正在跳转...',
        page_waiting:'<span class="browser-tag">浏览器</span>请在<b>浏览器窗口</b>中进入阅卷页面，完成后点击「页面就绪」。',
        page_confirmed:'页面已确认，正在分析...',
        detecting:'正在分析页面元素...',
        locating: s.locate_mode==='auto'?'自动检测完成，请确认定位结果。':'<span class="browser-tag">浏览器</span>请在页面上标记打分框和提交按钮位置。',
        running:'批改进行中，可随时修改批改标准。',
        finished:'批改已完成！',
        error:'出现错误，请检查日志。'
    };
    var msg=msgs[s.status];
    if(msg){h.innerHTML=msg;h.style.display='block'}else{h.style.display='none'}
}

function updateActionBtns(s){
    var box=document.getElementById('actionBtns');
    box.innerHTML='';box.style.display='none';
    if(s.status==='login_waiting'){
        box.style.display='flex';
        box.innerHTML='<button class="btn btn-green" onclick="confirmLogin()">已登录</button>';
        scrollToAction();
    }else if(s.status==='auto_login_detected'){
        confirmLogin();
    }else if(s.status==='page_waiting'){
        box.style.display='flex';
        box.innerHTML='<button class="btn btn-blue" onclick="confirmReady()">页面就绪</button>';
        scrollToAction();
    }
}

function dotClass(st){if(st==='finished')return 'dot-green';if(st==='error'||st==='stopped')return 'dot-red';return 'dot-yellow'}
function setStep(n){for(var i=1;i<=6;i++){var el=document.getElementById('st'+i);if(i<n)el.className='step done';else if(i===n)el.className='step active';else el.className='step'}}
function renderDetectedInfo(info){
    var html='<div style="margin-bottom:.35rem"><b>检测模式:</b> ';
    if(info.score_mode==='buttons'){html+='数字评分按钮';if(info.buttons)html+=' ('+info.buttons.join(', ')+')'}
    else if(info.score_mode==='input'){html+='输入框'}
    else{html+='未检测到'}
    html+='</div>';
    if(info.in_iframe)html+='<div style="margin-bottom:.35rem"><b>位置:</b> iframe #'+info.iframe_index+'</div>';
    if(info.score_element){
        var se=info.score_element;
        html+='<div style="margin-bottom:.35rem"><b>打分元素:</b> '+(se.text||se.type||'')+' ('+se.x+','+se.y+')</div>';
    }
    if(info.submit_element){
        var su=info.submit_element;
        html+='<div style="margin-bottom:.35rem"><b>提交按钮:</b> '+su.text+' ('+su.x+','+su.y+')</div>';
    }
    document.getElementById('detectedInfo').innerHTML=html;
}
function addLog(msg){var t=new Date().toLocaleTimeString();logLines.push('['+t+'] '+msg);if(logLines.length>100)logLines=logLines.slice(-50);var box=document.getElementById('logBox');box.innerHTML=logLines.map(function(l){return '<div class="log-line">'+l+'</div>'}).join('');box.scrollTop=box.scrollHeight}

function confirmLogin(){fetch('/api/auto/confirm-login',{method:'POST'});addLog('已确认登录')}
function confirmReady(){fetch('/api/auto/confirm-ready',{method:'POST'});addLog('已确认页面就绪')}
function confirmLocate(){fetch('/api/auto/overlay-done',{method:'POST',headers:{'Content-Type':'application/json'}}).then(function(){return fetch('/api/auto/confirm-locate',{method:'POST'})});addLog('已确认定位')}
function redoLocate(){fetch('/api/auto/redo-locate',{method:'POST'});addLog('重新标记中...')}
function stopGrading(){fetch('/api/auto/stop',{method:'POST'}).then(function(){document.getElementById('stopBtn').style.display='none';addLog('正在停止...')})}

// ============ 增量结果渲染 ============

function appendResults(results){
    var rd=document.getElementById('results');
    for(var i=renderedCount;i<results.length;i++){
        var r=results[i],id='ar-'+i;
        var card=document.createElement('div');card.className='result-card';card.id=id;
        if(!r.success){
            card.innerHTML='<div class="result-header" onclick="this.parentElement.querySelector(\'.result-body\').classList.toggle(\'open\')"><span>'+r.student+'</span><span class="badge badge-error">失败</span></div><div class="result-body"><div style="color:var(--red);font-size:.82rem">'+r.error+'</div></div>';
        }else{
            var d=r.data;
            card.innerHTML='<div class="result-header" onclick="this.parentElement.querySelector(\'.result-body\').classList.toggle(\'open\')"><span>'+r.student+'</span><div style="display:flex;gap:.35rem;align-items:center"><span class="badge badge-score">'+d.score+'/'+(d.max_score||curMaxScore)+'</span><span class="badge badge-grade">'+d.grade+'</span><span style="font-size:.6rem;color:var(--text-secondary)">&#9654;</span></div></div><div class="result-body"><div style="margin-bottom:.4rem"><b>识别:</b> '+(d.recognized_text||'')+'</div><div style="margin-bottom:.4rem"><b>评价:</b> '+(d.summary||'')+'</div><div><b>评语:</b> '+(d.detailed_comment||'')+'</div></div>';
        }
        rd.appendChild(card);
    }
    renderedCount=results.length;
    if(results.length>0&&results.length===lastResultsLen){
        var last=results[results.length-1];
        var lastCard=document.getElementById('ar-'+(results.length-1));
        if(lastCard&&last.success){
            var d=last.data;
            lastCard.innerHTML='<div class="result-header" onclick="this.parentElement.querySelector(\'.result-body\').classList.toggle(\'open\')"><span>'+last.student+'</span><div style="display:flex;gap:.35rem;align-items:center"><span class="badge badge-score">'+d.score+'/'+(d.max_score||curMaxScore)+'</span><span class="badge badge-grade">'+d.grade+'</span><span style="font-size:.6rem;color:var(--text-secondary)">&#9654;</span></div></div><div class="result-body"><div style="margin-bottom:.4rem"><b>识别:</b> '+(d.recognized_text||'')+'</div><div style="margin-bottom:.4rem"><b>评价:</b> '+(d.summary||'')+'</div><div><b>评语:</b> '+(d.detailed_comment||'')+'</div></div>';
        }
    }
    lastResultsLen=results.length;
    updateStats(results);
}

function updateStats(results){
    var sd=document.getElementById('stats');
    var ok=results.filter(function(r){return r.success});
    if(ok.length===0){sd.innerHTML='';return}
    var avg=Math.round(ok.reduce(function(s,r){return s+(r.data.score||0)},0)/ok.length);
    var mx=Math.max.apply(null,ok.map(function(r){return r.data.score||0}));
    var mn=Math.min.apply(null,ok.map(function(r){return r.data.score||0}));
    sd.innerHTML='<div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+avg+'</div><div class="stat-label">平均分/'+curMaxScore+'</div></div><div class="stat-card"><div class="stat-value" style="color:var(--green)">'+mx+'</div><div class="stat-label">最高分/'+curMaxScore+'</div></div><div class="stat-card"><div class="stat-value" style="color:var(--red)">'+mn+'</div><div class="stat-label">最低分/'+curMaxScore+'</div></div>';
}

// ============ 页面初始化 ============
document.addEventListener('DOMContentLoaded',function(){
    loadFormFromStorage();
    loadLastSession();
});
</script>
